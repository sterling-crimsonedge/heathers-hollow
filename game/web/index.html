<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heather's Hollow</title>
  <style>
    /* --- Cottagecore palette ----------------------------------------- */
    :root {
      --cream:        #f5efe0;
      --warm-ivory:   #faf3e3;
      --sage:         #a7c4a0;
      --deep-sage:    #6f8e68;
      --soft-blue:    #b6d0e2;
      --dusty-rose:   #e8b4b8;
      --marigold:     #f2c57c;
      --terracotta:   #c97b63;
      --wisteria:     #c9b6e4;
      --butter:       #ffe8b0;
      --charcoal:     #3d3a38;
      --driftwood:    #a89c8a;

      --shadow-soft:  0 8px 28px rgba(61, 58, 56, 0.18);
      --radius-soft:  18px;

      --serif: "Iowan Old Style", "Palatino", Georgia, serif;
      --sans:  "Avenir Next", "Helvetica Neue", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: var(--cream);
      color: var(--charcoal);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }
    #canvas:active { cursor: grabbing; }

    /* --- HUD --------------------------------------------------------- */

    .hud {
      position: absolute;
      pointer-events: none;
      color: var(--charcoal);
      font-family: var(--sans);
      user-select: none;
    }

    #hud-top-right {
      top: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(245, 239, 224, 0.85);
      backdrop-filter: blur(8px);
      padding: 8px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    #hud-clock-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--marigold);
      box-shadow: inset 0 0 4px rgba(0,0,0,0.1);
    }

    #hud-top-left {
      top: 16px;
      left: 16px;
      background: rgba(245, 239, 224, 0.85);
      backdrop-filter: blur(8px);
      padding: 10px 14px;
      border-radius: var(--radius-soft);
      box-shadow: var(--shadow-soft);
      font-family: var(--serif);
      font-size: 15px;
      max-width: 240px;
    }
    #hud-top-left .title {
      font-size: 18px;
      letter-spacing: 0.3px;
      margin-bottom: 2px;
    }
    #hud-top-left .sub {
      font-size: 11px;
      color: var(--driftwood);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #hud-bottom-center {
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      background: rgba(245, 239, 224, 0.92);
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
      font-size: 13px;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #hud-bottom-center.visible { opacity: 1; }
    .keycap {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--charcoal);
      color: var(--warm-ivory);
      font-family: var(--sans);
      font-size: 11px;
      margin-right: 6px;
    }

    #hud-bottom-right {
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: var(--driftwood);
      letter-spacing: 0.5px;
      background: rgba(245, 239, 224, 0.7);
      padding: 6px 10px;
      border-radius: 8px;
    }
    .conn-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--terracotta);
      margin-right: 6px;
      vertical-align: middle;
    }
    .conn-dot.ok { background: var(--sage); }

    /* --- Name prompt (first visit) ----------------------------------- */

    #name-modal {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 35%, rgba(255,232,176,0.4), rgba(61,58,56,0.65));
      backdrop-filter: blur(6px);
      z-index: 100;
    }
    #name-modal .card {
      background: var(--cream);
      padding: 28px 32px;
      border-radius: var(--radius-soft);
      box-shadow: var(--shadow-soft);
      max-width: 360px;
      text-align: center;
    }
    #name-modal h1 {
      font-family: var(--serif);
      font-size: 28px;
      margin: 0 0 6px;
      color: var(--charcoal);
    }
    #name-modal p {
      font-size: 13px;
      color: var(--driftwood);
      margin: 0 0 18px;
    }
    #name-modal input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--sage);
      background: var(--warm-ivory);
      font-family: var(--serif);
      font-size: 16px;
      color: var(--charcoal);
      outline: none;
      transition: border-color 0.15s;
    }
    #name-modal input:focus { border-color: var(--deep-sage); }
    #name-modal button {
      margin-top: 14px;
      padding: 10px 22px;
      border-radius: 999px;
      border: none;
      background: var(--dusty-rose);
      color: var(--charcoal);
      font-family: var(--sans);
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
    }
    #name-modal button:hover { background: var(--marigold); transform: translateY(-1px); }
    #name-modal .skip {
      display: block;
      margin-top: 10px;
      font-size: 11px;
      color: var(--driftwood);
      cursor: pointer;
      text-decoration: underline;
    }

    /* --- Chat panel -------------------------------------------------- */

    #chat-panel {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(40px);
      width: min(720px, calc(100% - 32px));
      background: rgba(245, 239, 224, 0.96);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-soft);
      box-shadow: var(--shadow-soft);
      padding: 16px 18px 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 50;
    }
    #chat-panel.open {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    #chat-name {
      display: inline-block;
      padding: 4px 12px;
      background: var(--dusty-rose);
      color: var(--charcoal);
      border-radius: 999px;
      font-family: var(--serif);
      font-size: 14px;
      letter-spacing: 0.4px;
    }
    #chat-close {
      cursor: pointer;
      font-size: 18px;
      color: var(--driftwood);
      background: none;
      border: none;
      line-height: 1;
    }

    #chat-log {
      max-height: 240px;
      overflow-y: auto;
      padding: 6px 4px;
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.55;
      color: var(--charcoal);
    }
    .chat-line { margin: 4px 0; }
    .chat-line.player {
      color: var(--driftwood);
      font-style: italic;
    }
    .chat-line.villager { color: var(--charcoal); }
    .chat-line.system  {
      color: var(--driftwood);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 6px;
    }

    #chat-input-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    #chat-input {
      flex: 1;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--sage);
      background: var(--warm-ivory);
      color: var(--charcoal);
      font-family: var(--serif);
      font-size: 14px;
      outline: none;
    }
    #chat-input:focus { border-color: var(--deep-sage); }
    .chat-btn {
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      background: var(--sage);
      color: var(--charcoal);
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .chat-btn:hover { background: var(--marigold); transform: translateY(-1px); }
    .chat-btn.gift  { background: var(--dusty-rose); }

    /* --- Gift menu --------------------------------------------------- */
    #gift-menu {
      display: none;
      margin-top: 10px;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      background: var(--warm-ivory);
      border-radius: 12px;
      border: 1px dashed var(--sage);
    }
    #gift-menu.open { display: flex; }
    .gift-item {
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--cream);
      border: 1px solid var(--driftwood);
      font-family: var(--serif);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .gift-item:hover { background: var(--marigold); }

    /* Scrollbar styling */
    #chat-log::-webkit-scrollbar { width: 8px; }
    #chat-log::-webkit-scrollbar-thumb {
      background: var(--sage);
      border-radius: 999px;
    }
    #chat-log::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- HUD --------------------------------------------------------- -->
  <div id="hud-top-left" class="hud">
    <div class="title">Heather's Hollow</div>
    <div class="sub" id="hud-subtitle">a quiet day</div>
  </div>

  <div id="hud-top-right" class="hud">
    <div id="hud-clock-dot"></div>
    <div id="hud-clock">--:--</div>
  </div>

  <div id="hud-bottom-center" class="hud">
    <span class="keycap">E</span><span id="prompt-text">Talk</span>
  </div>

  <div id="hud-bottom-right" class="hud">
    <span class="conn-dot" id="conn-dot"></span>
    <span id="conn-text">connecting…</span>
  </div>

  <!-- Name modal -------------------------------------------------- -->
  <div id="name-modal" style="display:none">
    <div class="card">
      <h1>Welcome home.</h1>
      <p>The villagers would like to know what to call you.</p>
      <form id="name-form">
        <input id="name-input" type="text" maxlength="32" placeholder="Heather" autocomplete="off" />
        <br />
        <button type="submit">Enter the hollow</button>
      </form>
      <span class="skip" id="name-skip">stay anonymous for now</span>
    </div>
  </div>

  <!-- Chat panel -------------------------------------------------- -->
  <div id="chat-panel">
    <div id="chat-header">
      <span id="chat-name">villager</span>
      <button id="chat-close">×</button>
    </div>
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="say something…" autocomplete="off" />
      <button id="chat-send" class="chat-btn">send</button>
      <button id="chat-gift" class="chat-btn gift">gift</button>
    </div>
    <div id="gift-menu">
      <!-- gift options injected by main.js -->
    </div>
  </div>

  <!-- Three.js + game scripts ------------------------------------ -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="./scene.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
